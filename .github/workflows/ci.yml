name: CI

on:
  push:
    branches:
      - main
      - parrot/submission-clean
  pull_request:
    branches:
      - main

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install development dependencies
        run: pip install -e .[dev]

      - name: Run ruff
        run: ruff check .

      - name: Run mypy
        run: mypy mcpwn_red

      - name: Run pytest
        run: pytest

  debian-package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Debian build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            debhelper \
            devscripts \
            dh-python \
            equivs \
            pybuild-plugin-pyproject \
            python3-all \
            python3-click \
            python3-hatchling \
            python3-httpx \
            python3-jinja2 \
            python3-pydantic \
            python3-rich \
            python3-setuptools \
            python3-yaml

      - name: Install CI shim for python3-mcp
        run: |
          tmpdir="$(mktemp -d)"
          cat > "${tmpdir}/python3-mcp-ci.control" <<'EOF'
          Section: python
          Priority: optional
          Standards-Version: 4.6.2
          Package: python3-mcp
          Version: 1.0.0
          Maintainer: GitHub Actions <actions@github.com>
          Architecture: all
          Description: dummy MCP SDK package for CI dependency resolution
           This package exists only to satisfy the mcpwn-red Debian build
           dependency in CI until python3-mcp is packaged in the archive.
          EOF
          (
            cd "${tmpdir}"
            equivs-build python3-mcp-ci.control
          )
          sudo dpkg -i "${tmpdir}/python3-mcp_1.0.0_all.deb"

      - name: Create upstream orig tarball
        run: |
          version="$(dpkg-parsechangelog -SVersion | sed 's/-.*//')"
          tar \
            --exclude-vcs \
            --transform "s,^\./,mcpwn-red-${version}/," \
            -czf "../mcpwn-red_${version}.orig.tar.gz" \
            .

      - name: Build Debian package
        run: |
          chmod +x debian/rules
          dpkg-buildpackage -us -uc

  debian-validation:
    runs-on: ubuntu-latest
    container:
      image: debian:sid

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Debian packaging tools and base dependencies
        run: |
          apt-get update
          apt-get install -y \
            autopkgtest \
            build-essential \
            ca-certificates \
            debhelper \
            devscripts \
            dh-python \
            git \
            lintian \
            pybuild-plugin-pyproject \
            python3-all \
            python3-build \
            python3-click \
            python3-hatchling \
            python3-httpx \
            python3-jinja2 \
            python3-pydantic \
            python3-rich \
            python3-setuptools \
            python3-yaml

      - name: Clone python3-mcp packaging repository
        run: git clone --depth 1 https://github.com/Mutasem-mk4/python3-mcp-debian.git ../python3-mcp-debian

      - name: Install python3-mcp dependency set
        run: |
          apt-get install -y \
            python3-anyio \
            python3-httpx-sse \
            python3-jsonschema \
            python3-jwt \
            python3-multipart \
            python3-pydantic-settings \
            python3-sse-starlette \
            python3-starlette \
            python3-typer \
            python3-typing-extensions \
            python3-typing-inspection \
            python3-uvicorn \
            python3-websockets

      - name: Build and install python3-mcp
        run: |
          cd ../python3-mcp-debian
          version="$(dpkg-parsechangelog -SVersion | sed 's/-.*//')"
          git archive --format=tar.gz \
            --prefix="python-mcp-${version}/" \
            -o "../python-mcp_${version}.orig.tar.gz" \
            HEAD
          chmod +x debian/rules
          dpkg-buildpackage -us -uc
          apt-get install -y ../python3-mcp_*_all.deb

      - name: Create upstream orig tarball
        run: |
          version="$(dpkg-parsechangelog -SVersion | sed 's/-.*//')"
          tar \
            --exclude-vcs \
            --transform "s,^\./,mcpwn-red-${version}/," \
            -czf "../mcpwn-red_${version}.orig.tar.gz" \
            .

      - name: Build Debian package
        run: |
          chmod +x debian/rules
          dpkg-buildpackage -us -uc

      - name: Run lintian
        run: lintian ../mcpwn-red_0.1.0-1_*.changes

      - name: Run autopkgtest
        run: autopkgtest ../python3-mcp_1.27.0-1_all.deb ../mcpwn-red_0.1.0-1_amd64.changes -- null
